  .avatar { width: 42px; height: 42px; background: var(--teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .messages::-webkit-scrollbar { width: 4px; }

  .msg-row { display: flex; gap: 10px; align-items: flex-end; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg-row.user { flex-direction: row-reverse; }
  .bubble { max-width: 80%; padding: 11px 15px; border-radius: 18px; font-size: 14px; line-height: 1.55; color: var(--text); }

  .user .bubble { background: var(--teal); color: #fff; border-bottom-right-radius: 5px; }
  .bot-icon { width: 28px; height: 28px; background: var(--teal-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .chip { padding: 7px 13px; background: var(--gray-chip); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; cursor: pointer; color: var(--text); transition: all 0.15s; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
  .chip:hover { background: var(--teal-light); border-color: var(--teal-mid); color: var(--teal); }
  .chip.danger { background: var(--red-light); border-color: #f09595; color: var(--red); }

  .typing span { width: 7px; height: 7px; background: var(--text3); border-radius: 50%; animation: bounce 1.2s infinite; }

  .typing span:nth-child(3) { animation-delay: 0.4s; }

  .input-area { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; background: var(--surface); }

  .disclaimer { text-align: center; font-size: 11px; color: var(--text3); padding: 6px 16px 10px; line-height: 1.4; }
</style>

    severo:{ indicaciones:["Toma <b>Dexketoprofeno 25 mg</b> cada 8 horas."], alerta:"Consulta al medico para evaluacion del oido a la brevedad." }
  },
  "Ginecologico": {
    leve:{ indicaciones:["Si presentas colicos menstruales, toma <b>Ibuprofen 400 mg</b> cada 8 horas.","Coloca un lienzo o bolsa de agua caliente sobre el abdomen.","Puedes tomar <b>te de manzanilla</b> como antiinflamatorio natural."], alerta:null },
    moderado:{ indicaciones:["Toma <b>Ibuprofen 400 mg</b> cada 8 horas.","Puedes tomar <b>te de manzanilla</b>."], alerta:"Si presentas sangrado abundante, comunicate con tu enfermera encargada." },
    severo:{ indicaciones:[], alerta:"Si presentas sangrado abundante, busca atencion medica inmediata." }
  },
  "Dental": {
    leve:{ indicaciones:["Toma <b>Ibuprofen 400 mg</b> cada 8 horas mientras buscas atencion con tu odontologo.","Evita alimentos muy frios, calientes o duros."], alerta:null },
    moderado:{ indicaciones:["Toma <b>Ibuprofen 400 mg</b> cada 8 horas.","Agenda una cita con tu odontologo a la brevedad."], alerta:null },
    severo:{ indicaciones:["Toma <b>Dexketoprofeno 25 mg</b> cada 8 horas."], alerta:"Consulta de forma urgente a tu odontologo." }
  },
  "Urinario": {
    leve:{ indicaciones:["Aumenta tu ingesta de agua - al menos 2 litros al dia.","Evita cafe, alcohol y refrescos.","Mantén buena higiene en el area."], alerta:"Contacta a tu enfermera o medico ocupacional." },
    moderado:{ indicaciones:["Mantente bien hidratado - al menos 2 litros de agua al dia.","Evita cafe, alcohol y refrescos."], alerta:"Contacta a tu enfermera o medico ocupacional." },
    severo:{ indicaciones:[], alerta:"Comunicate de inmediato con tu enfermera o medico ocupacional." }
  }
};

function getNivel(i) { if(i.includes("Leve")) return "leve"; if(i.includes("Moderado")) return "moderado"; return "severo"; }

async function seleccionarIntensidad(intensidad) {
  addUserMessage(intensidad); state.intensidad = intensidad;
  const nivel = getNivel(intensidad);
  const esSevero = nivel==="severo", esModerado = nivel==="moderado";
  const proto = PROTOCOLOS[state.sistema]?.[nivel];
  const esReferido = esSevero || esModerado;
  state.referido = esReferido;

  if (proto && proto.indicaciones.length > 0) {
    let extraHtml = "";
    if (proto.alerta) extraHtml += `<div class="${esSevero||esModerado?"alert-card":"success-card"}"><strong>${esSevero||esModerado?"Atencion":"Recuerda"}</strong>${proto.alerta}</div>`;
    if (esReferido) extraHtml += `<div class="alert-card" style="margin-top:6px"><strong>${getLabelContacto()}</strong><b>${getEnfermeria()}</b></div>`;
    addBotMessage(proto.indicaciones.map(i=>"• "+i).join("<br>"), extraHtml);
  } else {
    addBotMessage("Para este nivel de sintomas necesitas orientacion directa de nuestro equipo de salud.",
      `<div class="alert-card"><strong>${proto?.alerta||"Contacto recomendado"}</strong>${getLabelContacto()}: <b>${getEnfermeria()}</b></div>`);
  }

  await registrarConsulta({ pais:state.pais||"", sitio:state.sitio||"", colaborador:state.nombre||"", modulo:"Sintomas", sistema:state.sistema||"", intensidad:intensidad, referido:esReferido?"Si":"No" });
  mostrarOpccionFinal();
}

function iniciarModuloAlarma() {
  const p = PAISES[state.pais];
  addBotMessage("Ante signos de alarma, la accion inmediata es lo mas importante:",
    `<div class="alert-card"><strong>Signos que requieren atencion inmediata:</strong>${ALARMAS.slice(0,5).map(a=>"• "+a).join("<br>")}<br><br><b>Emergencias ${state.pais}:</b> ${p.emergencia}<br><b>Medico de clinica:</b> ${p.medico}</div>`);
  addBotMessage("Presentas alguno de estos sintomas en este momento?");
  addChips(["Si, presento uno o mas de estos sintomas","No, pero tengo otro sintoma preocupante"],"respuestaAlarma","danger");
}

async function respuestaAlarma(respuesta) {
  addUserMessage(respuesta);
  const p = PAISES[state.pais];
  const esEmergencia = respuesta.startsWith("Si");
  if (esEmergencia) {
    addBotMessage("<b>Esto requiere atencion medica inmediata.</b> No esperes.",
      `<div class="alert-card"><strong>Llama ahora mismo</strong><b>Emergencias ${state.pais}:</b> ${p.emergencia}<br><b>Medico de clinica:</b> ${p.medico}<br><b>${getLabelContacto()}:</b> ${getEnfermeria()}<br><br>Si estas solo/a, avisa a un companero cercano.</div>`);
  } else {
    addBotMessage("Cuentame que sintoma te preocupa y lo evaluamos juntos."); state.fase="libre";
  }
  await registrarConsulta({ pais:state.pais||"", sitio:state.sitio||"", colaborador:state.nombre||"", modulo:"Alarma", sistema:"", intensidad:esEmergencia?"Emergencia":"Preocupante", referido:"Si" });
  mostrarOpccionFinal();
}

function iniciarModuloSuspension() {
  const ente = ENTE_SALUD[state.pais]||"seguro social";
  addBotMessage(`Entendido. Te guio paso a paso para gestionar tu suspension medica en ${state.pais}.`);
  setTimeout(()=>{ addBotMessage("<b>Paso 1 - Notifica a tu lider</b><br>Informa a tu lider directo sobre tu suspension.",`<div class="info-card"><strong>Por que es importante?</strong>Tu lider necesita saberlo para cubrir tus funciones y registrar tu ausencia.</div>`); },400);
  setTimeout(()=>{ addBotMessage(`<b>Paso 2 - Envia tu suspension al area de salud</b><br>Remite tu constancia a la enfermera o medico de tu sitio.`,`<div class="info-card"><strong>${getLabelContacto()} de tu sitio</strong>${getEnfermeria()}</div>`); },800);
  setTimeout(()=>{ addBotMessage("<b>Paso 3 - Notifica a tu KAM de Gestion Humana</b><br>Para que registre la suspension y notifique a nomina."); },1200);
  setTimeout(()=>{ addBotMessage("<b>Tipos de suspension validos</b>",`<div class="info-card"><strong>Suspension del seguro social (${ente})</strong>Es la mas comun y valida directamente.<br><br><strong>Suspension de medico particular</strong>Solo valida si tiene <b>firma y sello de colegiado activo</b>. Debe validarla el Medico PDC.</div>`); },1600);
  setTimeout(()=>{ addBotMessage(`Tu suspension fue emitida por el seguro social (${ente}) o por un medico particular?`); addChips([`Por el ${ente} (seguro social)`,"Por medico particular","Tengo otra duda"],"respuestaTipoSuspension"); },2000);
}

async function respuestaTipoSuspension(tipo) {
  addUserMessage(tipo);
  const ente = ENTE_SALUD[state.pais]||"seguro social";
  if (tipo.includes("seguro social")||tipo.includes(ente)) {
    addBotMessage(`Perfecto. Tu suspension del <b>${ente}</b> es valida directamente.`,`<div class="success-card"><strong>Resumen</strong>1. Notifica a tu <b>lider directo</b>.<br>2. Envia constancia a <b>${getLabelContacto()}: ${getEnfermeria()}</b>.<br>3. Notifica a tu <b>KAM de Gestion Humana</b>.</div>`);
  } else if (tipo.includes("particular")) {
    addBotMessage("Las suspensiones de medico particular requieren un paso adicional.",`<div class="alert-card"><strong>Requisito</strong>La constancia debe tener <b>firma y sello de colegiado activo</b>.<br>Enviala a: <b>${getLabelContacto()}: ${getEnfermeria()}</b></div>`);
  } else {
    addBotMessage("Con gusto te ayudo. Cuentame cual es tu duda."); state.fase="libre"; return;
  }
  await registrarConsulta({ pais:state.pais||"", sitio:state.sitio||"", colaborador:state.nombre||"", modulo:"Suspension", sistema:"", intensidad:tipo, referido:"Si" });
  mostrarOpccionFinal();
}

function mostrarOpccionFinal() {
  setTimeout(()=>{ addBotMessage("Hay algo mas en lo que pueda orientarte?"); addChips(["Tengo otra consulta","Eso es todo, gracias"],"cierreConversacion"); },600);
}
function cierreConversacion(opcion) {
  addUserMessage(opcion);
  if (opcion.includes("otra consulta")) mostrarMenuPrincipal();
  else { addBotMessage("Que te mejores pronto. Estamos aqui cuando nos necesites. Cuidate!"); state.fase="cerrado"; }
}

async function sendUserMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;
  input.value = ""; input.style.height = "auto";
  addUserMessage(text);
  if (state.fase==="nombre") { ingresarNombre(text); return; }
  if (state.fase==="cerrado") { addBotMessage("Sesion cerrada. Recarga la pagina para iniciar una nueva consulta."); return; }
  showTyping();
  try { const r = await callClaude(text); removeTyping(); addBotMessage(r); }
  catch(e) { removeTyping(); addBotMessage("Hubo un problema de conexion. Por favor intenta de nuevo."); }
}
function handleKey(e) { if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendUserMessage(); } }
function autoResize(el) { el.style.height="auto"; el.style.height=Math.min(el.scrollHeight,100)+"px"; }
window.addEventListener("DOMContentLoaded",()=>{ document.getElementById("api-key-input").focus(); });
</script>
